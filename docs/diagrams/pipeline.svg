  <path class="muted" d="M1220 246 C1098 326 500 332 356 390" />
  <path class="muted" d="M1220 246 C1080 326 720 332 578 390" />

  <path class="line" d="M664 429 H714" />
  <path class="line" d="M886 429 H936" />
