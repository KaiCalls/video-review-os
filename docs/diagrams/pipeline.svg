  <path class="line" d="M578 468 C552 530 492 572 466 619" />
  <path class="line" d="M800 468 C700 556 568 590 466 619" />
  <path class="line" d="M1022 468 C834 586 602 616 466 619" />
  <path class="line" d="M1244 468 C990 618 660 624 466 619" />

  <path class="line" d="M466 619 H548" />
  <path class="line" d="M744 619 H826" />
  <path class="line" d="M1022 619 H1104" />
</svg>
