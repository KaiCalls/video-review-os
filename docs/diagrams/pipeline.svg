<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Video Review OS full pipeline</title>
  <desc id="desc">Raw videos become transcripts, clip candidates, captions, scene frames, visual drafts, MP4 renders, dashboards, approvals, and manual post queues.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:14}.media{fill:#eff6ff;stroke:#60a5fa;stroke-width:2;rx:14}.visual{fill:#f5f3ff;stroke:#a78bfa;stroke-width:2;rx:14}.safe{fill:#ecfdf5;stroke:#34d399;stroke-width:2;rx:14}.warn{fill:#fff7ed;stroke:#fb923c;stroke-width:2;rx:14}.stop{fill:#fef2f2;stroke:#f87171;stroke-width:2;rx:14}.title{font:700 28px Arial,sans-serif;fill:#0f172a}.text{font:700 16px Arial,sans-serif;fill:#0f172a}.small{font:13px Arial,sans-serif;fill:#475569}.line{stroke:#334155;stroke-width:2.1;fill:none;marker-end:url(#arrow)}.muted{stroke:#94a3b8;stroke-width:1.8;fill:none;marker-end:url(#arrow);stroke-dasharray:5 5}
    </style>
  </defs>
  <rect class="bg" width="1400" height="760" rx="24" />
  <text x="48" y="54" class="title">Raw video to reviewed posting assets</text>
  <text x="48" y="82" class="small">Default behavior: cut, caption, visualize, render only allowed drafts, then stop for human approval.</text>

  <rect class="box" x="48" y="130" width="160" height="74" />
  <text x="82" y="160" class="text">Raw videos</text>
  <text x="70" y="184" class="small">Local watch folder</text>

  <rect class="box" x="258" y="130" width="160" height="74" />
  <text x="306" y="160" class="text">Ingest</text>
  <text x="284" y="184" class="small">Project folder</text>

  <rect class="media" x="468" y="88" width="172" height="74" />
  <text x="508" y="118" class="text">ffprobe</text>
  <text x="496" y="142" class="small">Media metadata</text>

  <rect class="media" x="468" y="184" width="172" height="74" />
  <text x="509" y="214" class="text">Transcribe</text>
  <text x="496" y="238" class="small">Words + times</text>

  <rect class="box" x="690" y="130" width="172" height="74" />
  <text x="724" y="160" class="text">Select clips</text>
  <text x="721" y="184" class="small">Candidate ranges</text>

  <rect class="warn" x="912" y="130" width="172" height="74" />
  <text x="952" y="160" class="text">Quality gate</text>
  <text x="942" y="184" class="small">Audience-first flags</text>

  <rect class="safe" x="1134" y="76" width="172" height="74" />
  <text x="1195" y="106" class="text">Keep</text>
  <text x="1167" y="130" class="small">Allowed to render</text>

  <rect class="box" x="1134" y="172" width="172" height="74" />
  <text x="1174" y="202" class="text">Trim / review</text>
  <text x="1162" y="226" class="small">Visible, no render</text>

  <rect class="stop" x="1134" y="268" width="172" height="74" />
  <text x="1193" y="298" class="text">Reject</text>
  <text x="1178" y="322" class="small">Never render</text>

  <rect class="media" x="48" y="390" width="172" height="78" />
  <text x="88" y="421" class="text">Cut MP4s</text>
  <text x="70" y="445" class="small">ffmpeg render drafts</text>

  <rect class="media" x="270" y="390" width="172" height="78" />
  <text x="315" y="421" class="text">Captions</text>
  <text x="303" y="445" class="small">SRT + VTT files</text>

  <rect class="media" x="492" y="390" width="172" height="78" />
  <text x="535" y="421" class="text">Frames</text>
  <text x="516" y="445" class="small">Scene stills</text>

  <rect class="visual" x="714" y="390" width="172" height="78" />
  <text x="751" y="421" class="text">Thumbnails</text>
  <text x="746" y="445" class="small">Frame-based SVGs</text>

  <rect class="visual" x="936" y="390" width="172" height="78" />
  <text x="976" y="421" class="text">Scene cards</text>
  <text x="964" y="445" class="small">Optional mascots</text>

  <rect class="box" x="1158" y="390" width="172" height="78" />
  <text x="1194" y="421" class="text">Copy drafts</text>
  <text x="1187" y="445" class="small">Hooks + titles</text>

  <rect class="box" x="270" y="578" width="196" height="82" />
  <text x="313" y="610" class="text">Dashboard</text>
  <text x="303" y="634" class="small">Static HTML + JSON</text>

  <rect class="safe" x="548" y="578" width="196" height="82" />
  <text x="608" y="610" class="text">Approval</text>
  <text x="584" y="634" class="small">Source + range locked</text>

  <rect class="warn" x="826" y="578" width="196" height="82" />
  <text x="875" y="610" class="text">Post queue</text>
  <text x="856" y="634" class="small">Manual handoff only</text>

  <rect class="stop" x="1104" y="578" width="196" height="82" />
  <text x="1142" y="610" class="text">No auto-publish</text>
  <text x="1138" y="634" class="small">Explicit adapter required</text>

